<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description" content="赛博工坊 - 今日运势与解压小游戏" />
  <meta name="theme-color" content="#06060f" />
  <title>赛博工坊 | Cyber Lab</title>
  <link rel="stylesheet" href="/css/hub.css" />
</head>
<body>
  <div class="viewport-bg" aria-hidden="true">
    <div class="bg-orb bg-orb-1"></div>
    <div class="bg-orb bg-orb-2"></div>
    <div class="bg-orb bg-orb-3"></div>
    <div class="bg-grid"></div>
  </div>

  <main class="hub">
    <header class="hub-header">
      <p class="hub-chip">CYBER LAB · 2026</p>
      <h1 class="hub-title">
        赛博<span class="accent">工坊</span>
      </h1>
      <p class="hub-subtitle">选一条路进入：看今日运势、砸碎一切解压，或生成一条带货短剧</p>
    </header>

    <section class="hub-cards" aria-label="功能入口">
      <a class="hub-card fortune-card" href="/fortune.html">
        <div class="card-glow" aria-hidden="true"></div>
        <div class="card-icon" aria-hidden="true">✦</div>
        <div class="card-body">
          <span class="card-kicker">AI FORTUNE</span>
          <h2 class="card-title">今日赛博运势</h2>
          <p class="card-desc">每日抽签、幸运值、欧皇榜与分享海报。AI 生成打工人今日 Buff。</p>
          <span class="card-cta">进入运势 <span class="arrow">→</span></span>
        </div>
      </a>

      <a class="hub-card game-card" href="/game.html">
        <div class="card-glow" aria-hidden="true"></div>
        <div class="card-icon" aria-hidden="true">◈</div>
        <div class="card-body">
          <span class="card-kicker">LEVEL CAMPAIGN</span>
          <h2 class="card-title">赛博解压</h2>
          <p class="card-desc">闯关砸碎：清掉全部目标通关，关卡越高物体越硬越挤。</p>
          <span class="card-cta">开始闯关 <span class="arrow">→</span></span>
        </div>
      </a>

      <a class="hub-card drama-card" href="/short-drama.html">
        <div class="card-glow" aria-hidden="true"></div>
        <div class="card-icon" aria-hidden="true">▣</div>
        <div class="card-body">
          <span class="card-kicker">AI COMMERCE VIDEO</span>
          <h2 class="card-title">AI 带货短剧</h2>
          <p class="card-desc">上传商品图和介绍，Coze 生成视频提示词，Seedance 输出竖屏短剧。</p>
          <span class="card-cta">生成短剧 <span class="arrow">→</span></span>
        </div>
      </a>
    </section>

    <footer class="hub-footer">
      <p>多套体验独立运行 · 共享赛博视觉风格</p>
    </footer>
  </main>
</body>
</html>
